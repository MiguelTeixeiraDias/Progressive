name: Deploy PWA

# Auto-deploys the web build to EAS Hosting on every push to main.
# Manual runs are also available via the "Run workflow" button (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys if you push twice quickly — cancel the in-flight one.
concurrency:
  group: deploy-pwa
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        run: npx expo export --platform web
        env:
          # EXPO_PUBLIC_* vars are inlined into the bundle at export time, so they
          # must be present here (CI has no .env — it's gitignored).
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy to EAS Hosting (production)
        run: npx eas-cli@latest deploy --prod --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
